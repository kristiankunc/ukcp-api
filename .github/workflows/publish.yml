name: publish

on:
    release:
        types: [released]
    workflow_dispatch:

jobs:
    build-and-publish:
        runs-on: ubuntu-latest
        permissions:
            id-token: write

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 26
                  cache: npm

            - run: npm ci

            - run: npm run build

            - run: npm publish --provenance
